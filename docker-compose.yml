version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: logiflow_db
    environment:
      POSTGRES_USER: logiflow
      POSTGRES_PASSWORD: logiflow123
      POSTGRES_DB: logiflow
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U logiflow']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: logiflow_api
    environment:
      DATABASE_URL: postgresql://logiflow:logiflow123@postgres:5432/logiflow
      JWT_SECRET: supersecret_change_in_prod
      JWT_REFRESH_SECRET: supersecret_refresh_change_in_prod
      PORT: 3001
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: 5242880
      CORS_ORIGINS: http://localhost:5173,http://localhost:5174
    ports:
      - '3001:3001'
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  gestion:
    build:
      context: ./apps/gestion
      dockerfile: Dockerfile
    container_name: logiflow_gestion
    ports:
      - '5173:80'
    depends_on:
      - api

  conductor:
    build:
      context: ./apps/conductor
      dockerfile: Dockerfile
    container_name: logiflow_conductor
    ports:
      - '5174:80'
    depends_on:
      - api

volumes:
  postgres_data:
  uploads_data:
